name: OpenSandbox Infra E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: OpenSandbox API base URL (overrides repository secret)
        required: false
        default: ""
      disposable_namespace:
        description: Auto-generate an isolated namespace when no namespace is provided
        required: true
        default: true
        type: boolean
      cleanup_generated_namespace:
        description: Best-effort cleanup of generated namespace sandboxes after the test run
        required: true
        default: true
        type: boolean
      namespace:
        description: Optional OpenSandbox namespace
        required: false
        default: ""
      namespace_prefix:
        description: Prefix for generated namespace when disposable mode is used
        required: true
        default: sandbox-core-ci

jobs:
  opensandbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve OpenSandbox settings
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "OPENSANDBOX_BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.OPENSANDBOX_BASE_URL }}" ]; then
            echo "OPENSANDBOX_BASE_URL=${{ secrets.OPENSANDBOX_BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "Missing OpenSandbox base URL. Provide workflow input 'base_url' or repository secret OPENSANDBOX_BASE_URL."
            exit 1
          fi

          echo "OPENSANDBOX_NAMESPACE_PREFIX=${{ inputs.namespace_prefix }}" >> "$GITHUB_ENV"
          echo "OPENSANDBOX_DISPOSABLE_NAMESPACE=${{ inputs.disposable_namespace }}" >> "$GITHUB_ENV"
          echo "OPENSANDBOX_CLEANUP_GENERATED_NAMESPACE=${{ inputs.cleanup_generated_namespace }}" >> "$GITHUB_ENV"

          NAMESPACE_VALUE=""
          if [ -n "${{ inputs.namespace }}" ]; then
            NAMESPACE_VALUE="${{ inputs.namespace }}"
          fi

          if [ -n "${NAMESPACE_VALUE}" ]; then
            echo "OPENSANDBOX_NAMESPACE=${NAMESPACE_VALUE}" >> "$GITHUB_ENV"
          elif [ "${{ inputs.disposable_namespace }}" = "false" ]; then
            echo "OPENSANDBOX_CLEANUP_GENERATED_NAMESPACE=false" >> "$GITHUB_ENV"
          fi

      - name: Run OpenSandbox infra verification
        run: npm run test:opensandbox:infra
        env:
          OPENSANDBOX_BASE_URL: ${{ env.OPENSANDBOX_BASE_URL }}
          OPENSANDBOX_API_KEY: ${{ secrets.OPENSANDBOX_API_KEY }}
          OPENSANDBOX_NAMESPACE: ${{ env.OPENSANDBOX_NAMESPACE }}
          OPENSANDBOX_NAMESPACE_PREFIX: ${{ env.OPENSANDBOX_NAMESPACE_PREFIX }}
          OPENSANDBOX_DISPOSABLE_NAMESPACE: ${{ env.OPENSANDBOX_DISPOSABLE_NAMESPACE }}
          OPENSANDBOX_CLEANUP_GENERATED_NAMESPACE: ${{ env.OPENSANDBOX_CLEANUP_GENERATED_NAMESPACE }}
