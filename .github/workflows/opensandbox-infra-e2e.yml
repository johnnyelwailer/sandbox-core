name: OpenSandbox Infra E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: OpenSandbox API base URL (overrides repository secret)
        required: false
        default: ""
      disposable_namespace:
        description: Auto-generate an isolated namespace when no namespace is provided
        required: true
        default: true
        type: boolean
      cleanup_generated_namespace:
        description: Best-effort cleanup of generated namespace sandboxes after the test run
        required: true
        default: true
        type: boolean
      namespace:
        description: Optional OpenSandbox namespace
        required: false
        default: ""

jobs:
  opensandbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve OpenSandbox settings
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "OPENSANDBOX_BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.OPENSANDBOX_BASE_URL }}" ]; then
            echo "OPENSANDBOX_BASE_URL=${{ secrets.OPENSANDBOX_BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "Missing OpenSandbox base URL. Provide workflow input 'base_url' or repository secret OPENSANDBOX_BASE_URL."
            exit 1
          fi

          NAMESPACE_VALUE=""
          if [ -n "${{ inputs.namespace }}" ]; then
            NAMESPACE_VALUE="${{ inputs.namespace }}"
          elif [ "${{ inputs.disposable_namespace }}" = "true" ]; then
            NAMESPACE_VALUE="sandbox-core-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            echo "OPENSANDBOX_NAMESPACE_GENERATED=1" >> "$GITHUB_ENV"
          fi

          if [ -n "${NAMESPACE_VALUE}" ]; then
            echo "OPENSANDBOX_NAMESPACE=${NAMESPACE_VALUE}" >> "$GITHUB_ENV"
          fi

      - name: Run OpenSandbox integration test
        run: npm run test:opensandbox
        env:
          RUN_OPENSANDBOX_TESTS: "1"
          OPENSANDBOX_BASE_URL: ${{ env.OPENSANDBOX_BASE_URL }}
          OPENSANDBOX_API_KEY: ${{ secrets.OPENSANDBOX_API_KEY }}
          OPENSANDBOX_NAMESPACE: ${{ env.OPENSANDBOX_NAMESPACE }}

      - name: Cleanup generated OpenSandbox namespace
        if: ${{ always() && inputs.cleanup_generated_namespace && env.OPENSANDBOX_NAMESPACE != '' && env.OPENSANDBOX_NAMESPACE_GENERATED == '1' }}
        run: node ./scripts/opensandbox-cleanup.mjs
        env:
          OPENSANDBOX_BASE_URL: ${{ env.OPENSANDBOX_BASE_URL }}
          OPENSANDBOX_API_KEY: ${{ secrets.OPENSANDBOX_API_KEY }}
          OPENSANDBOX_NAMESPACE: ${{ env.OPENSANDBOX_NAMESPACE }}
