name: Azure Infra E2E

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region for the temporary resource group
        required: true
        default: westeurope
      resource_group_prefix:
        description: Prefix for generated temporary resource group
        required: true
        default: sandbox-core-ci-e2e

jobs:
  azure-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_LOCATION: ${{ inputs.location }}
      AZURE_RESOURCE_GROUP_PREFIX: ${{ inputs.resource_group_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Azure auth configuration
        run: |
          if [ -n "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            exit 0
          fi

          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && [ -n "${{ secrets.AZURE_TENANT_ID }}" ] && [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            exit 0
          fi

          echo "Missing Azure auth configuration."
          echo "Set either AZURE_CREDENTIALS, or AZURE_CLIENT_ID + AZURE_TENANT_ID + AZURE_SUBSCRIPTION_ID."
          exit 1

      - name: Azure login (service principal JSON)
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure login (OIDC)
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Azure infra verification
        run: npm run test:azure:infra
