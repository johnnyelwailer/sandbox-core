name: Azure Infra E2E

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region for the temporary resource group
        required: true
        default: westeurope
      resource_group_prefix:
        description: Prefix for generated temporary resource group
        required: true
        default: sandbox-core-ci-e2e

jobs:
  azure-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_LOCATION: ${{ inputs.location }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create temporary resource group
        run: |
          RG_NAME="${{ inputs.resource_group_prefix }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "AZURE_RESOURCE_GROUP=${RG_NAME}" >> "$GITHUB_ENV"
          az group create \
            --name "${RG_NAME}" \
            --location "${AZURE_LOCATION}" \
            --tags "owner=github-actions" "repo=${GITHUB_REPOSITORY}" "run_id=${GITHUB_RUN_ID}" \
            --output none

      - name: Run Azure integration test
        run: npm run test:azure
        env:
          RUN_AZURE_TESTS: "1"
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}

      - name: Delete temporary resource group
        if: always()
        run: |
          if [ -n "${AZURE_RESOURCE_GROUP}" ]; then
            az group delete --name "${AZURE_RESOURCE_GROUP}" --yes --no-wait
          fi
